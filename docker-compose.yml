version: '3.8'

services:
  backend:
    build: .
    container_name: todo_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_k9f6zVoptSTQ@ep-restless-morning-ai4jfe2t-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-57ZzULo3TAxlR9IdMJfXV3uybyWQNKlJ}
    volumes:
      - ./backend:/app
    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-57ZzULo3TAxlR9IdMJfXV3uybyWQNKlJ}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge